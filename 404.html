<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Stackly | 404 Page</title>

  <!-- CSS -->
  <link rel="stylesheet" href="404.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- Background Glow -->
  <div class="glow one"></div>
  <div class="glow two"></div>

  <!-- Main Section -->
  <section class="error-container">

    <!-- Left Content -->
    <div class="error-content">

      <div class="error-badge">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>404 Error</span>
      </div>

      <h1>404</h1>

      <h2>Page Not Found</h2>

      <p>
        Sorry, the page you are looking for doesn’t exist or has been moved.
        Continue exploring Stackly Marketplace safely.
      </p>

      <div class="error-buttons">

        <a href="index.html" class="btn-primary">
          <i class="fa-solid fa-house"></i>
          Back Home
        </a>

        <a href="contact.html" class="btn-secondary">
          <i class="fa-solid fa-headset"></i>
          Contact Support
        </a>

      </div>

    </div>

    <!-- Right Image -->
    <div class="error-image">

      <div class="image-glow"></div>

      <img
      src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6?q=80&w=1200&auto=format&fit=crop"
      alt="Stackly">

      <div class="floating-card">

        <i class="fa-solid fa-seedling"></i>

        <div>
          <h4>Stackly Marketplace</h4>
          <p>Trusted by thousands of farmers</p>
        </div>

      </div>

    </div>

  </section>

</body>
</html>
